<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="leftWingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#00a859" />
    </linearGradient>
    <linearGradient id="rightWingGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1b3d" />
      <stop offset="100%" stop-color="#00a859" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00a859" />
      <stop offset="100%" stop-color="#0b1b3d" />
    </linearGradient>
  </defs>

  <!-- Stylized Butterfly Icon -->
  <g transform="translate(250, 210)">
    <!-- Left Wings -->
    <path d="M-10,-20 C-60,-80 -160,-70 -160,0 C-160,50 -100,70 -70,50 C-60,40 -50,20 -10,10 Z" fill="url(#leftWingGrad)" opacity="0.95"/>
    <path d="M-8,15 C-40,40 -100,60 -100,100 C-100,130 -60,140 -40,110 C-30,95 -20,70 -8,45 Z" fill="url(#leftWingGrad)" opacity="0.85"/>
    
    <!-- Right Wings -->
    <path d="M10,-20 C60,-80 160,-70 160,0 C160,50 100,70 70,50 C60,40 50,20 10,10 Z" fill="url(#rightWingGrad)" opacity="0.95"/>
    <path d="M8,15 C40,40 100,60 100,100 C100,130 60,140 40,110 C30,95 20,70 8,45 Z" fill="url(#rightWingGrad)" opacity="0.85"/>

    <!-- Central Body / Cross -->
    <path d="M-6,-60 C-6,-65 6,-65 6,-60 L6,70 C6,75 -6,75 -6,70 Z" fill="url(#bodyGrad)" />
    <path d="M-30,-25 C-35,-25 -35,-33 -30,-33 L30,-33 C35,-33 35,-25 30,-25 Z" fill="#00a859" />
    
    <!-- Rising Potential Elements / Sparkles -->
    <circle cx="-120" cy="-60" r="4" fill="#00a859" opacity="0.8"/>
    <circle cx="120" cy="-60" r="4" fill="#00a859" opacity="0.8"/>
    <circle cx="0" cy="-85" r="5" fill="#00a859" />
    <path d="M0,-110 L2,-95 L17,-93 L2,-91 L0,-76 L-2,-91 L-17,-93 L-2,-95 Z" fill="#00a859" opacity="0.9"/>
  </g>

  <!-- Typography / Brand Name -->
  <text x="250" y="380" font-family="'Inter', 'Playfair Display', sans-serif" font-size="24" font-weight="800" fill="#0b1b3d" text-anchor="middle" letter-spacing="4">
    BUTTERFLY EFFECT
  </text>
  <text x="250" y="415" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#00a859" text-anchor="middle" letter-spacing="6">
    WELLNESS
  </text>
  <text x="250" y="440" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#4e5d78" text-anchor="middle" letter-spacing="3" opacity="0.8">
    A WELLNESS EVOLUTION
  </text>
</svg>
